name: kargo-pipelines chart

on:
  pull_request:
    # Only consider PRs that change files for this asset, including ci scripts
    paths:
      - '.github/workflows/kargo-pipelines-chart.yaml'
      - 'charts/kargo-pipelines/**'
  push:
    # Only release off of release and maintenance branches for this asset
    branches:
      - 'main'
    # Only consider pushes that change files for this asset, including ci scripts
    paths:
      - '.github/workflows/kargo-pipelines-chart.yaml'
      - 'charts/kargo-pipelines/**'

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel early on pull requests if new commits are added,
  # Don't cancel on release pushes
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Job name must be unique across repo to target
  # branch protection rules "required checks" properly!
  kargo-pipelines-chart:
    uses: SwanseaUniversityMedical/workflows/.github/workflows/pr-and-release-chart.yaml@v4.0.0-charts
    with:
      job-name: kargo-pipelines-chart
      comment-pr: "true"
      comment-release: "true"
      registry: ${{ vars.HARBOR_REGISTRY }}
      registry-user: ${{ vars.HARBOR_USER }}
      registry-project: ${{ vars.HARBOR_PROJECT }}
      registry-repo: kargo-pipelines
      release-tag-format: 'v${version}-kargo-pipelines-chart'
      notation-cert: ${{ vars.NOTATION_CERT }}
      chart: charts/kargo-pipelines

    secrets:
      notation-key: ${{ secrets.NOTATION_KEY }}
      registry-token: ${{ secrets.HARBOR_TOKEN }}
